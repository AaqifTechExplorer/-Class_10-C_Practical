<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Class 10-C Practical</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1b4b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Class 10-C">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e1b4b'/><path d='M20 25 Q35 21 45 24 L45 78 Q35 74 20 79 Z' fill='%234338ca'/><path d='M55 24 Q65 21 80 25 L80 79 Q65 74 55 78 Z' fill='%233730a3'/><path d='M45 24 Q50 21 55 24 L55 78 Q50 75 45 78 Z' fill='%23e0e7ff'/><path d='M55 24 Q60 21 65 24 L65 78 Q60 75 55 78 Z' fill='%23ffffff'/></svg>">
<style>
  .global-ripple{
  position:fixed;
  border-radius:50%;
  background:radial-gradient(circle,rgba(100,120,255,.7) 0%,rgba(100,120,255,.2) 40%,transparent 70%);
  transform:scale(0);
  animation:globalRipple .6s ease-out forwards;
  pointer-events:none;
  z-index:9999;
}
@keyframes globalRipple{
  to{transform:scale(1);opacity:0;}
}
  .subject{position:relative;overflow:hidden;}
  .subject::before{
  content:'';
  position:absolute;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(100,120,255,.35) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
  left:var(--mx,50%);
  top:var(--my,50%);
  transform:translate(-50%,-50%) scale(0);
  transition:transform .15s ease,opacity .3s ease;
  opacity:0;
}
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(100,120,255,.35);
  transform:scale(0);
  animation:rippleAnim .5s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleAnim{
  to{transform:scale(4);opacity:0;}
}
.subject:hover::before{transform:translate(-50%,-50%) scale(1);opacity:1;}
.subject:hover::before{transform:translate(-50%,-50%) scale(1);opacity:1;}
 .clock-wrap{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:4px 12px;}
 .clock-seg{display:flex;flex-direction:column;align-items:center}
 .clock-val{font-size:13px;font-weight:700;color:#3730a3;letter-spacing:1px;transition:all .3s ease}
 .clock-val{font-size:16px;font-weight:700;color:#3730a3;letter-spacing:1px;transition:all .3s ease}
 .clock-lbl{font-size:11px;color:#5f6368;letter-spacing:.5px}
 .clock-div{font-size:14px;font-weight:700;color:#5f6368;margin-bottom:8px;animation:blink 1s step-end infinite}
 .date-pill{font-size:14px;font-weight:600;color:#4338ca;background:#e0e7ff;padding:4px 12px;border-radius:99px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

  :root {
    --header-h: 64px;
    --nav-h: 60px;
    --sidebar-w: 300px;
    --accent: linear-gradient(135deg, #4a6cf7, #9b5de5);
    --active-bg: linear-gradient(135deg, #dce7ff, #f0dcff);
  }

  body {
    background: linear-gradient(135deg, #eef4ff, #f7ecff, #effff7);
    color: #202124;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #e8e8e8;
    position: relative;
    z-index: 100;
  }
  .header-title { font-size: 20px; font-weight: 800; }
  .menu-btn {
    display: none;
    background: none;
    border: none;
    font-size: 26px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 10px;
    transition: background .2s;
  }
  .menu-btn:hover { background: #f0f0f0; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    height: calc(100dvh - var(--header-h));
    position: relative;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(12px);
    border-right: 1px solid #e8e8e8;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .3s ease;
    z-index: 50;
  }
  .search-wrap { padding: 14px; border-bottom: 1px solid #f0f0f0; }
  .search {
    width: 100%;
    padding: 11px 14px;
    border-radius: 14px;
    border: 1px solid #d9d9d9;
    font-size: 14px;
    outline: none;
    background: #fff;
  }
  .subject-list { overflow-y: auto; padding: 10px; flex: 1; }
  .subject {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 16px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all .22s ease;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn .35s forwards;
  }
  .subject:hover{background:#f0f4ff;transform:translateX(3px);}
.subject:hover .s-icon{animation:wiggle .4s ease infinite alternate;}
@keyframes wiggle{
  0%{transform:rotate(-15deg) scale(1.2);}
  100%{transform:rotate(15deg) scale(1.3);}
}
  .subject.active { background: var(--active-bg); box-shadow: 0 4px 14px rgba(100,130,255,.15); }
  .s-icon { font-size: 24px; min-width: 32px; text-align: center; }
  .s-name { font-size: 15px; font-weight: 700; }
  .s-sub  { font-size: 11px; color: #5f6368; margin-top: 2px; }

  /* ── VIEWER ── */
  .viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100%;
  }
  .viewer-top {
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #e8e8e8;
    flex-shrink: 0;
  }
  .viewer-title { font-size: 17px; font-weight: 700; }
  .open-btn {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 20px;
    background: var(--accent);
    white-space: nowrap;
    transition: opacity .2s;
    flex-shrink: 0;
  }
  .open-btn:hover { opacity: .85; }
  .viewer-body{flex:1;padding:6px;overflow:hidden;}
  .viewer-card {
    background: #fff;
    border-radius: 20px;
    height: 100%;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,.08);
  }
  iframe { width: 100%; height: 100%; border: none; }
  .empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #5f6368;
    text-align: center;
    padding: 20px;
  }
  .empty-icon { font-size: 50px; }
  .empty p { font-size: 16px; }

  /* ── MOBILE OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 40;
  }
  .overlay.show { display: block; }

  /* ── MOBILE BOTTOM NAV ── */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 62px;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid #e8e8e8;
    z-index: 200;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 10px;
    overflow-x: auto;
  }
  .bnav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 56px;
    padding: 6px 8px;
    border-radius: 14px;
    cursor: pointer;
    transition: background .2s;
    border: none;
    background: none;
    flex-shrink: 0;
  }
  .bnav-item:hover { background: #f0f4ff; }
  .bnav-item.active { background: var(--active-bg); }
  .bnav-icon { font-size: 20px; }
  .bnav-label { font-size: 10px; font-weight: 700; color: #444; white-space: nowrap; }

  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

  /* ════════════════════════════════
     TABLET  (601px – 900px)
  ════════════════════════════════ */
  @media (max-width: 900px) and (min-width: 601px) {
    :root { --sidebar-w: 240px; }
    .header-title { font-size: 17px; }
    .s-name { font-size: 14px; }
    .viewer-title { font-size: 15px; }
  }

  /* ════════════════════════════════
     MOBILE  (≤ 600px)
  ════════════════════════════════ */
  @media (max-width: 600px) {
    body { overflow: hidden; }

    .menu-btn { display: block; }

    /* sidebar slides in from left */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 280px;
      height: 100dvh;
      transform: translateX(-100%);
      box-shadow: 4px 0 24px rgba(0,0,0,.12);
    }
    .sidebar.open { transform: translateX(0); }

    .layout { height: calc(100dvh - var(--header-h) - 62px); }

    .viewer { height: 100%; }

    .viewer-top { padding: 0 14px; }
    .viewer-title { font-size: 15px; }
    .open-btn { font-size: 11px; padding: 6px 11px; }

    .viewer-body { padding: 10px; }
    .viewer-card { border-radius: 16px; }

    .bottom-nav { display: flex; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title" style="display:flex;align-items:center;gap:10px;">
  <svg width="36" height="36" viewBox="285 55 110 90" xmlns="http://www.w3.org/2000/svg">
    <rect x="285" y="55" width="110" height="90" rx="14" fill="#1e1b4b"/>
    <path d="M305 65 Q320 61 330 64 L330 128 Q320 124 305 129 Z" fill="#4338ca"/>
    <path d="M350 64 Q360 61 375 65 L375 129 Q360 124 350 128 Z" fill="#3730a3"/>
    <path d="M330 64 Q340 61 350 64 L350 128 Q340 125 330 128 Z" fill="#e0e7ff"/>
    <path d="M350 64 Q360 61 370 64 L370 128 Q360 125 350 128 Z" fill="#ffffff"/>
    <line x1="350" y1="64" x2="350" y2="128" stroke="#818cf8" stroke-width="1"/>
  </svg>
  Class 10-C Practical
</div>
</div>
<div style="display:flex;align-items:center;gap:8px;margin-left:auto;margin-right:10px">
  <span class="date-pill" id="datePill"></span>
  <span class="date-pill" id="dayPill" style="background:#dcfce7;color:#166534"></span>
  <div class="clock-wrap">
    <div class="clock-seg"><span class="clock-val" id="hh">00</span><span class="clock-lbl">hr</span></div>
    <span class="clock-div">:</span>
    <div class="clock-seg"><span class="clock-val" id="mm">00</span><span class="clock-lbl">min</span></div>
    <span class="clock-div">:</span>
    <div class="clock-seg"><span class="clock-val" id="ss">00</span><span class="clock-lbl">sec</span></div>
  </div>
</div>
  <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
</header>

<div class="overlay" id="overlay"></div>

<div class="layout">
  <!-- SIDEBAR (desktop & tablet always visible, mobile slides in) -->
  <div class="sidebar" id="sidebar">
    <div class="search-wrap">
      <input class="search" id="search" placeholder="Search subject..." />
    </div>
    <div class="subject-list" id="subjectList"></div>
  </div>

  <!-- MAIN VIEWER -->
  <div class="viewer">
    <div class="viewer-top">
      <span class="viewer-title" id="viewerTitle">Select a subject</span>
      <a class="open-btn" id="openBtn" href="#" target="_blank">📂 Drive-এ খুলুন</a>
    </div>
    <div class="viewer-body">
      <div class="viewer-card" id="viewerArea">
        <div class="empty">
          <div class="empty-icon">📖</div>
          <p>একটা subject বেছে নাও</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<script>
/* ═══════════════════════════════════════
   CONFIG — শুধু এখানে folder ID বদলাও
═══════════════════════════════════════ */
document.addEventListener('mousemove',e=>{
  const el=e.target.closest('.subject');
  if(!el)return;
  const r=el.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  el.style.setProperty('--mx',x+'px');
  el.style.setProperty('--my',y+'px');
});
document.addEventListener('pointerdown',e=>{
  const el=e.target.closest('.subject');
  if(!el)return;
  const r=el.getBoundingClientRect();
  const size=80;
  const x=e.clientX-r.left-size/2;
  const y=e.clientY-r.top-size/2;
  const ripple=document.createElement('span');
  ripple.className='ripple';
  ripple.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  el.appendChild(ripple);
  setTimeout(()=>ripple.remove(),500);
});
document.addEventListener('pointerdown',e=>{
  const size=200;
  const ripple=document.createElement('span');
  ripple.className='global-ripple';
  ripple.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-size/2}px;top:${e.clientY-size/2}px;`;
  document.body.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);
});
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(n){return String(n).padStart(2,'0')}
function animTick(el,val){el.classList.add('tick');setTimeout(()=>{el.textContent=val;el.classList.remove('tick')},150)}
let pS=-1,pM=-1,pH=-1;
function tickClock(){
  const n=new Date();
  document.getElementById('datePill').textContent=`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${String(n.getFullYear()).slice(-2)}`;
  document.getElementById('dayPill').textContent=days[n.getDay()];
  const s=n.getSeconds(),m=n.getMinutes(),h=n.getHours();
  if(s!==pS){animTick(document.getElementById('ss'),pad(s));pS=s}
  if(m!==pM){animTick(document.getElementById('mm'),pad(m));pM=m}
  if(h!==pH){animTick(document.getElementById('hh'),pad(h));pH=h}
}
tickClock();setInterval(tickClock,1000);
const subjects = [
  { name: 'Physics',     icon: '⚡', folderId: '1HmBWwB7wLAMb4ILiubgZfH5WQyOmNJ0-' },
  { name: 'Chemistry',   icon: '🧪', folderId: '1ak7VCuqNT4JyCP6aUNf1H7SBnmMBvk08' },
  { name: 'Biology',     icon: '🌿', folderId: '1XNPRbsDLngrLNogewqLn2lGsBmwmW0wU'  },
  { name: 'Higher Math', icon: '📐', folderId: '1TpbgkOSQ9kDxpk4-NeOM010ZDJ5usdOA'  },
  { name: 'ICT',         icon: '💻', folderId: '1Udk5LtNw-sE-i1oJjaNxpDYxnv_ZnXMc'  }
];
/* ═══════════════════════════════════════ */

const $ = id => document.getElementById(id);
const subjectList = $('subjectList');
const viewerArea  = $('viewerArea');
const viewerTitle = $('viewerTitle');
const openBtn     = $('openBtn');
const bottomNav   = $('bottomNav');
const sidebar     = $('sidebar');
const overlay     = $('overlay');
const menuBtn     = $('menuBtn');

let activeIndex = -1;

function embedUrl(id){ return `https://drive.google.com/embeddedfolderview?id=${id}#list`; }
function driveUrl(id){ return `https://drive.google.com/drive/folders/${id}`; }

function selectSubject(i){
  activeIndex = i;
  const s = subjects[i];

  // update sidebar active
  document.querySelectorAll('.subject').forEach((el,j) => el.classList.toggle('active', j===i));
  // update bottom nav active
  document.querySelectorAll('.bnav-item').forEach((el,j) => el.classList.toggle('active', j===i));

  viewerTitle.textContent = s.name;
  openBtn.href = driveUrl(s.folderId);
  viewerArea.innerHTML = `<iframe src="${embedUrl(s.folderId)}" allowfullscreen></iframe>`;

  // close sidebar on mobile
  closeSidebar();
}

function closeSidebar(){
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

menuBtn.addEventListener('click', () => {
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('show', isOpen);
});
overlay.addEventListener('click', closeSidebar);

function renderSidebar(filter=''){
  subjectList.innerHTML = '';
  subjects
    .filter(s => s.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'subject' + (i === activeIndex ? ' active' : '');
      div.style.animationDelay = `${i * 45}ms`;
      div.innerHTML = `<div class="s-icon">${s.icon}</div>
        <div><div class="s-name">${s.name}</div><div class="s-sub">Practical folder</div></div>`;
      div.onclick = () => selectSubject(i);
      subjectList.appendChild(div);
    });
}

function renderBottomNav(){
  bottomNav.innerHTML = '';
  subjects.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'bnav-item' + (i === activeIndex ? ' active' : '');
    btn.innerHTML = `<span class="bnav-icon">${s.icon}</span><span class="bnav-label">${s.name}</span>`;
    btn.onclick = () => { renderSidebar($('search').value); renderBottomNav(); selectSubject(i); };
    bottomNav.appendChild(btn);
  });
}

$('search').addEventListener('input', e => renderSidebar(e.target.value));

renderSidebar();
renderBottomNav();
</script>
</body>
</html>
