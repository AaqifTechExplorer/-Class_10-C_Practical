<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Class 10-C Practical</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="10-C Practical">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1560'/><path d='M20 25 Q35 21 45 24 L45 78 Q35 74 20 79 Z' fill='%234338ca'/><path d='M55 24 Q65 21 80 25 L80 79 Q65 74 55 78 Z' fill='%233730a3'/><path d='M45 24 Q50 21 55 24 L55 78 Q50 75 45 78 Z' fill='%23e0e7ff'/><path d='M55 24 Q60 21 65 24 L65 78 Q60 75 55 78 Z' fill='%23ffffff'/></svg>">
<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:       #f0f4ff;
  --c-surface:  #ffffff;
  --c-sidebar:  #ffffff;
  --c-header:   rgba(255,255,255,0.96);
  --c-border:   #e4e8f0;
  --c-text:     #1a1a2e;
  --c-muted:    #6b7280;
  --c-accent:   #4338ca;
  --c-accent2:  #7c3aed;
  --c-active:   #ede9fe;
  --c-active2:  #ddd6fe;
  --c-pill-bg:  #e0e7ff;
  --c-pill-txt: #3730a3;
  --c-day-bg:   #dcfce7;
  --c-day-txt:  #15803d;
  --c-grad:     linear-gradient(135deg,#4338ca,#7c3aed);

  --header-h: 58px;
  --viewer-h: 50px;
  --sidebar-w: 270px;
  --bnav-h: 64px;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(67,56,202,0.10);
}

html {
  height: 100%;
  height: 100dvh;
}

body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
  height: var(--header-h);
  min-height: var(--header-h);
  max-height: var(--header-h);
  background: var(--c-header);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 500;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 800;
  color: var(--c-text);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: -0.3px;
}
.logo svg { width: 30px; height: 30px; flex-shrink: 0; }

.header-mid {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  overflow: hidden;
  min-width: 0;
}

.pill {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
}
.pill-date { background: var(--c-pill-bg); color: var(--c-pill-txt); }
.pill-day  { background: var(--c-day-bg);  color: var(--c-day-txt); }

.clock-box {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--c-pill-bg);
  border-radius: 10px;
  padding: 4px 10px;
  flex-shrink: 0;
}
.cs { display: flex; flex-direction: column; align-items: center; }
.cv {
  font-size: 14px; font-weight: 800;
  color: var(--c-accent);
  line-height: 1.1;
  transition: opacity .2s, transform .2s;
}
.cv.tick { opacity: 0; transform: translateY(-4px); }
.cl { font-size: 9px; color: var(--c-muted); font-weight: 600; }
.colon {
  font-size: 14px; font-weight: 800;
  color: var(--c-muted);
  margin-bottom: 7px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.menu-btn {
  display: none;
  background: none;
  border: none;
  width: 36px; height: 36px;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  transition: background .2s;
  color: var(--c-text);
}
.menu-btn:hover { background: var(--c-pill-bg); }

/* ═══════════════════════════════════════
   BODY AREA  (everything below header)
═══════════════════════════════════════ */
.body-area {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
  position: relative;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  max-width: var(--sidebar-w);
  height: 100%;
  background: var(--c-sidebar);
  border-right: 1px solid var(--c-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 100;
}

.search-box {
  padding: 12px;
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 9px 13px;
  border-radius: 12px;
  border: 1.5px solid var(--c-border);
  font-size: 14px;
  outline: none;
  background: var(--c-bg);
  color: var(--c-text);
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--c-accent); }

.sub-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scroll-behavior: smooth;
}
.sub-list::-webkit-scrollbar { width: 4px; }
.sub-list::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 4px; }

.sub-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 13px;
  border-radius: 13px;
  cursor: pointer;
  margin-bottom: 4px;
  position: relative;
  overflow: hidden;
  transition: background .18s, transform .18s;
  opacity: 0;
  transform: translateY(10px);
  animation: slideUp .3s forwards;
}
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }

.sub-item:hover { background: #f5f3ff; transform: translateX(3px); }
.sub-item:hover .si-icon { animation: wiggle .35s ease infinite alternate; }
.sub-item.active {
  background: var(--c-active);
  box-shadow: 0 2px 12px rgba(109,40,217,.12);
}

/* hover glow */
.sub-item::before {
  content: '';
  position: absolute;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(109,40,217,.22) 0%, transparent 70%);
  pointer-events: none;
  left: var(--gx, 50%);
  top: var(--gy, 50%);
  transform: translate(-50%,-50%) scale(0);
  transition: transform .15s, opacity .25s;
  opacity: 0;
}
.sub-item:hover::before { transform: translate(-50%,-50%) scale(1); opacity: 1; }

@keyframes wiggle {
  0%  { transform: rotate(-14deg) scale(1.15); }
  100%{ transform: rotate(14deg)  scale(1.25); }
}

.si-icon { font-size: 22px; min-width: 28px; text-align: center; }
.si-name { font-size: 14px; font-weight: 700; }
.si-sub  { font-size: 11px; color: var(--c-muted); margin-top: 1px; }

/* ripple */
.rip {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  background: rgba(109,40,217,.25);
  transform: scale(0);
  animation: rip .5s ease-out forwards;
}
@keyframes rip { to { transform: scale(4); opacity: 0; } }

/* ═══════════════════════════════════════
   VIEWER
═══════════════════════════════════════ */
.viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}

.viewer-top {
  height: var(--viewer-h);
  min-height: var(--viewer-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--c-header);
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
  gap: 8px;
}
.v-title {
  font-size: 15px; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.drive-btn {
  font-size: 11px; font-weight: 700;
  color: #fff;
  text-decoration: none;
  padding: 6px 13px;
  border-radius: 20px;
  background: var(--c-grad);
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity .2s, transform .15s;
}
.drive-btn:hover { opacity: .88; transform: scale(1.03); }

.viewer-body {
  flex: 1;
  padding: 10px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.vcard {
  flex: 1;
  background: var(--c-surface);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.vcard iframe {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
  min-height: 0;
  opacity: 0;
  transition: opacity .4s ease;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--c-muted);
  text-align: center;
  padding: 24px;
}
.empty-state .big { font-size: 52px; }
.empty-state p { font-size: 15px; font-weight: 500; }

/* ═══════════════════════════════════════
   OVERLAY
═══════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  -webkit-tap-highlight-color: transparent;
}
.overlay.show { display: block; }

/* ═══════════════════════════════════════
   BOTTOM NAV  (mobile only)
═══════════════════════════════════════ */
.bnav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bnav-h);
  background: rgba(255,255,255,.98);
  border-top: 1px solid var(--c-border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 400;
  align-items: center;
  justify-content: space-around;
  padding: 0 6px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  overflow-x: auto;
  gap: 2px;
}
.bnav::-webkit-scrollbar { display: none; }

.bn-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 8px;
  border-radius: 12px;
  cursor: pointer;
  border: none;
  background: none;
  flex-shrink: 0;
  min-width: 50px;
  transition: background .18s;
  -webkit-tap-highlight-color: transparent;
}
.bn-item:hover  { background: #f5f3ff; }
.bn-item.active { background: var(--c-active); }
.bn-ico  { font-size: 20px; line-height: 1; }
.bn-lbl  { font-size: 10px; font-weight: 700; color: var(--c-muted); white-space: nowrap; }
.bn-item.active .bn-lbl { color: var(--c-accent); }

/* ═══════════════════════════════════════
   GLOBAL RIPPLE
═══════════════════════════════════════ */
.gripple {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  background: radial-gradient(circle,
    rgba(109,40,217,.35) 0%,
    rgba(109,40,217,.08) 45%,
    transparent 70%);
  transform: scale(0);
  animation: gripAnim .65s ease-out forwards;
}
@keyframes gripAnim { to { transform: scale(1); opacity: 0; } }

/* ═══════════════════════════════════════
   TABLET  601–900px
═══════════════════════════════════════ */
@media (max-width: 900px) and (min-width: 601px) {
  :root { --sidebar-w: 220px; }
  .logo span { font-size: 13px; }
  .pill { font-size: 11px; padding: 3px 9px; }
  .cv { font-size: 13px; }
}

/* ═══════════════════════════════════════
   MOBILE  ≤600px
═══════════════════════════════════════ */
@media (max-width: 600px) {
  :root {
    --header-h: 52px;
    --viewer-h: 46px;
  }

  /* show hamburger, hide day pill */
  .menu-btn { display: flex; }
  .pill-day { display: none; }

  /* shrink clock */
  .clock-box { padding: 3px 8px; gap: 3px; }
  .cv { font-size: 13px; }
  .cl { font-size: 8px; }
  .colon { font-size: 13px; }

  /* sidebar: fixed drawer */
  .sidebar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    height: 100dvh !important;
    width: min(80vw, 300px) !important;
    min-width: unset !important;
    max-width: unset !important;
    transform: translateX(-110%) !important;
    transition: transform .28s cubic-bezier(.4,0,.2,1) !important;
    box-shadow: 6px 0 32px rgba(0,0,0,.18) !important;
    z-index: 300 !important;
  }
  .sidebar.open {
    transform: translateX(0) !important;
  }

  /* body area needs bottom space for bnav */
  .body-area {
    margin-bottom: var(--bnav-h);
  }

  /* show bottom nav */
  .bnav { display: flex; }

  /* viewer adjustments */
  .viewer-body { padding: 6px; }
  .vcard { border-radius: 12px; }
  .v-title { font-size: 14px; }
  .drive-btn { font-size: 10px; padding: 5px 10px; }
}

/* ═══════════════════════════════════════
   VERY SMALL  ≤360px
═══════════════════════════════════════ */
@media (max-width: 360px) {
  .logo span { display: none; }
  .clock-box { display: none; }
  .pill-date { font-size: 11px; padding: 3px 8px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <svg viewBox="285 55 110 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="285" y="55" width="110" height="90" rx="14" fill="#1a1560"/>
      <path d="M305 65 Q320 61 330 64 L330 128 Q320 124 305 129 Z" fill="#4338ca"/>
      <path d="M350 64 Q360 61 375 65 L375 129 Q360 124 350 128 Z" fill="#3730a3"/>
      <path d="M330 64 Q340 61 350 64 L350 128 Q340 125 330 128 Z" fill="#e0e7ff"/>
      <path d="M350 64 Q360 61 370 64 L370 128 Q360 125 350 128 Z" fill="#ffffff"/>
      <line x1="350" y1="64" x2="350" y2="128" stroke="#818cf8" stroke-width="1.2"/>
    </svg>
    <span>Class 10-C Practical</span>
  </div>

  <div class="header-mid">
    <span class="pill pill-date" id="datePill">--/--/--</span>
    <span class="pill pill-day"  id="dayPill">---</span>
    <div class="clock-box">
      <div class="cs"><span class="cv" id="hh">00</span><span class="cl">hr</span></div>
      <span class="colon">:</span>
      <div class="cs"><span class="cv" id="mm">00</span><span class="cl">min</span></div>
      <span class="colon">:</span>
      <div class="cs"><span class="cv" id="ss">00</span><span class="cl">sec</span></div>
    </div>
  </div>

  <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
</header>

<!-- OVERLAY (mobile) -->
<div class="overlay" id="overlay"></div>

<!-- BODY -->
<div class="body-area">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="search-box">
      <input class="search-input" id="searchInput" placeholder="Search subject..." autocomplete="off"/>
    </div>
    <div class="sub-list" id="subList"></div>
  </aside>

  <!-- VIEWER -->
  <main class="viewer">
    <div class="viewer-top">
      <span class="v-title" id="vTitle">Select a subject</span>
      <a class="drive-btn" id="driveBtn" href="#" target="_blank" rel="noopener">📂 Drive-এ খুলুন</a>
    </div>
    <div class="viewer-body">
      <div class="vcard" id="vcard">
        <div class="empty-state">
          <div class="big">📖</div>
          <p>বাম দিক থেকে একটা<br>subject বেছে নাও</p>
        </div>
      </div>
    </div>
  </main>

</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav"></nav>

<script>
/* ─── CONFIG ─────────────────────────── */
const SUBJECTS = [
  { name:'Physics',     icon:'⚡', id:'1HmBWwB7wLAMb4ILiubgZfH5WQyOmNJ0-' },
  { name:'Chemistry',   icon:'🧪', id:'1ak7VCuqNT4JyCP6aUNf1H7SBnmMBvk08' },
  { name:'Biology',     icon:'🌿', id:'1XNPRbsDLngrLNogewqLn2lGsBmwmW0wU'  },
  { name:'Higher Math', icon:'📐', id:'1TpbgkOSQ9kDxpk4-NeOM010ZDJ5usdOA'  },
  { name:'ICT',         icon:'💻', id:'1Udk5LtNw-sE-i1oJjaNxpDYxnv_ZnXMc'  }
];

/* ─── ELEMENTS ───────────────────────── */
const g  = id => document.getElementById(id);
const sidebar    = g('sidebar');
const overlay    = g('overlay');
const menuBtn    = g('menuBtn');
const subList    = g('subList');
const bnav       = g('bnav');
const vcard      = g('vcard');
const vTitle     = g('vTitle');
const driveBtn   = g('driveBtn');
const searchInput= g('searchInput');

let activeIdx = -1;
const isMobile = () => window.innerWidth <= 600;

/* ─── SIDEBAR OPEN/CLOSE ─────────────── */
function openSidebar() {
  sidebar.classList.add('open');
  overlay.classList.add('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}
menuBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
overlay.addEventListener('click', closeSidebar);

/* ─── SUBJECT SELECT ─────────────────── */
function selectSubject(idx) {
  activeIdx = idx;
  const s = SUBJECTS[idx];

  vTitle.textContent = s.name;
  driveBtn.href = `https://drive.google.com/drive/folders/${s.id}`;

  vcard.innerHTML = `<iframe
    src="https://drive.google.com/embeddedfolderview?id=${s.id}#list"
    allowfullscreen></iframe>`;

  const fr = vcard.querySelector('iframe');
  fr.onload = () => { fr.style.opacity = '1'; };

  refreshActive();
  if (isMobile()) closeSidebar();
}

function refreshActive() {
  document.querySelectorAll('.sub-item').forEach((el,i) =>
    el.classList.toggle('active', i === activeIdx));
  document.querySelectorAll('.bn-item').forEach((el,i) =>
    el.classList.toggle('active', i === activeIdx));
}

/* ─── RENDER SIDEBAR LIST ────────────── */
function renderList(filter = '') {
  subList.innerHTML = '';
  const q = filter.toLowerCase();
  SUBJECTS
    .filter(s => s.name.toLowerCase().includes(q))
    .forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'sub-item' + (i === activeIdx ? ' active' : '');
      el.style.animationDelay = `${i * 40}ms`;
      el.innerHTML = `
        <div class="si-icon">${s.icon}</div>
        <div>
          <div class="si-name">${s.name}</div>
          <div class="si-sub">Practical folder</div>
        </div>`;
      el.addEventListener('click', () => {
        selectSubject(i);
        renderList(searchInput.value);
        renderBnav();
      });
      subList.appendChild(el);
    });
}

/* ─── RENDER BOTTOM NAV ──────────────── */
function renderBnav() {
  bnav.innerHTML = '';
  SUBJECTS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'bn-item' + (i === activeIdx ? ' active' : '');
    btn.innerHTML = `<span class="bn-ico">${s.icon}</span><span class="bn-lbl">${s.name}</span>`;
    btn.addEventListener('click', () => {
      selectSubject(i);
      renderList(searchInput.value);
      renderBnav();
    });
    bnav.appendChild(btn);
  });
}

searchInput.addEventListener('input', e => renderList(e.target.value));

/* ─── CLOCK ──────────────────────────── */
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const pad  = n => String(n).padStart(2,'0');
function tickEl(el, val) {
  el.classList.add('tick');
  setTimeout(() => { el.textContent = val; el.classList.remove('tick'); }, 180);
}
let ps=-1, pm=-1, ph=-1;
function clockTick() {
  const now = new Date();
  g('datePill').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${String(now.getFullYear()).slice(-2)}`;
  g('dayPill').textContent = DAYS[now.getDay()];
  const s=now.getSeconds(), m=now.getMinutes(), h=now.getHours();
  if(s!==ps){ tickEl(g('ss'),pad(s)); ps=s; }
  if(m!==pm){ tickEl(g('mm'),pad(m)); pm=m; }
  if(h!==ph){ tickEl(g('hh'),pad(h)); ph=h; }
}
clockTick();
setInterval(clockTick, 1000);

/* ─── HOVER GLOW ─────────────────────── */
document.addEventListener('mousemove', e => {
  const el = e.target.closest('.sub-item');
  if (!el) return;
  const r = el.getBoundingClientRect();
  el.style.setProperty('--gx', (e.clientX - r.left) + 'px');
  el.style.setProperty('--gy', (e.clientY - r.top)  + 'px');
});

/* ─── ITEM RIPPLE ────────────────────── */
document.addEventListener('pointerdown', e => {
  const el = e.target.closest('.sub-item');
  if (!el) return;
  const r = el.getBoundingClientRect(), sz = 70;
  const sp = document.createElement('span');
  sp.className = 'rip';
  sp.style.cssText =
    `width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
  el.appendChild(sp);
  setTimeout(() => sp.remove(), 500);
});

/* ─── GLOBAL RIPPLE ──────────────────── */
document.addEventListener('pointerdown', e => {
  const sz = 200;
  const sp = document.createElement('span');
  sp.className = 'gripple';
  sp.style.cssText =
    `width:${sz}px;height:${sz}px;left:${e.clientX-sz/2}px;top:${e.clientY-sz/2}px`;
  document.body.appendChild(sp);
  setTimeout(() => sp.remove(), 650);
});

/* ─── INIT ───────────────────────────── */
renderList();
renderBnav();
</script>
</body>
